<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Auth - Restaurant Food</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link rel="stylesheet" href="login.css">
</head>

<body>

<div class="auth-box">

    <div class="auth-left">
        <h2>Welcome to</h2>
        <h1 class="fw-bold">RESTAURANT FOOD</h1>
        <p>Order your favorite meals instantly 🍔🍕</p>
    </div>

    <div class="auth-right">

        <form id="loginForm">
            <h3 class="fw-bold mb-4 text-center">Login</h3>

            <input type="email" class="form-control mb-3" placeholder="Email">
            <input type="password" class="form-control mb-3" placeholder="Password">

            <a class="btn btn-main" href="/Restaurant/index.html">
                Login
            </a>
    

            <p class="text-center mt-3">
                Don't have an account?
                <span class="toggle-text" onclick="showRegister()">Register</span>
            </p>
        </form>

        <form id="registerForm">
            <h3 class="fw-bold mb-4 text-center">Register</h3>

            <input type="text" class="form-control mb-3" placeholder="Full Name">
            <input type="email" class="form-control mb-3" placeholder="Email">
            <input type="password" class="form-control mb-3" placeholder="Password">
            <input type="password" class="form-control mb-3" placeholder="Confirm Password">

            <button class="btn btn-main">Register</button>

            <p class="text-center mt-3">
                Already have an account?
               <span class="toggle-text" onclick="showLogin()">Login</span>
            </p>
        </form>

    </div>
</div>

<script>
function showRegister() {
    document.getElementById("loginForm").style.display = "none";
    document.getElementById("registerForm").style.display = "block";
}

function showLogin() {
    document.getElementById("registerForm").style.display = "none";
    document.getElementById("loginForm").style.display = "block";
}
</script>

</body>
</html>
